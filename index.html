<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fasting & Prayers</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="reader-shell">
      <aside class="day-list" aria-label="Days">
        <div class="list-heading">
          <p>40 Days</p>
          <h1>Fasting & Prayers</h1>
        </div>
        <nav id="dayNav" class="day-nav" aria-label="Prayer days"></nav>
      </aside>

      <section class="content-panel" aria-live="polite">
        <div class="content-heading">
          <h2 id="dayTitle">Day 1</h2>
        </div>
        <article id="dayContent" class="day-content"></article>
      </section>
    </main>

    <script src="content-data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
